<h1>故事 STORY</h1>

<p>
故事背景：以筆者的部分生命經驗為基礎，講述一位普通高中生－－維特的日常生活。
</p>

<p>
在家裡，他是最不受寵的小孩，在父親的高壓式教育和母親的差別待遇下長大；在學校，他是不被老師看好的學生、安靜又不起眼的邊緣人、備受同儕排擠與霸凌的黑羊。
</p>

<p>
然而，到了放學時間，在一個35歲獨居男人的家中，維特有另一個身分－－握有掌控權的支配者......
</p>

<p>
關係中的兩人，究竟會成為彼此生命中的救贖，抑或是將彼此推向逐漸潰爛的深淵？
</p>
